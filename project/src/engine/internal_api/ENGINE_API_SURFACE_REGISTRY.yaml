# SEARCH_KEY: SB_ENGINE_INTERNAL_API_SURFACE_REGISTRY
registry:
  name: engine_internal_api_surface
  status: validated
  authority: engine
  naming_rule: Engine<OperationName>
  request_type_rule: Engine<OperationName>Request
  result_type_rule: Engine<OperationName>Result
  operation_id_rule: lowercase dotted family.operation_name
  security_note: embedded mode is trusted in-process and is not a security boundary

schema_fields:
  - operation_id
  - scope_status
  - closure_slice
  - function_name
  - request_type
  - result_type
  - family
  - authority_domain
  - header
  - implementation
  - implementation_status
  - default_diagnostic
  - cluster_only
  - accepts_names
  - requires_transaction_context
  - sblr_mapping_required
  - requires_cluster_authority
  - requires_security_context
  - notes

