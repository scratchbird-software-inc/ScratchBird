[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "scratchbird-sqlalchemy"
version = "0.1.0"
description = "ScratchBird SQLAlchemy dialect"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "Apache-2.0"}
keywords = ["scratchbird", "sqlalchemy", "sbwp"]
authors = [
  {name = "ScratchBird Project"},
]
dependencies = [
  "scratchbird>=0.1.0",
  "SQLAlchemy>=1.4,<3.0",
]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
]

[project.optional-dependencies]
tooling = ["pytest"]

[project.entry-points."sqlalchemy.dialects"]
scratchbird = "scratchbird_sqlalchemy.dialect:ScratchBirdDialect"

[tool.setuptools]
packages = ["scratchbird_sqlalchemy"]
