# ScratchBird IPC Server public standalone configuration template.

[config]
format = SBCD1

[server]
mode = foreground

[server.runtime]
data_dir = runtime/data
control_dir = runtime/control

[server.logging]
log_file = stderr
log_level = info

[server.security]
provider_family = local_password
provider_state = healthy
default_policy_installed = true

[server.database]
default_path = data/default.sbdb
auto_create = false
open_mode = normal
daemon_scope = shared

[server.listener.native]
enabled = true
bind_host = 127.0.0.1
port = 3050
executable_path = bin/SBgate
parser_executable_path = bin/SBParser
control_dir = runtime/listener/control
runtime_dir = runtime/listener/runtime
tls_required = true
ready_timeout_ms = 8000

[server.metrics]
enabled = true
flush_interval_ms = 1000

[server.memory]
policy_name = production_gate
hard_limit_bytes = 1073741824
soft_limit_bytes = 805306368
per_context_limit_bytes = 134217728
page_buffer_pool_limit_bytes = 536870912
failure_mode = fail_closed
track_allocations = true
zero_memory_on_allocate = false
zero_memory_on_release = true
reject_over_soft_limit = true
policy_provenance = public_standalone_default
policy_generation = 1
enable_platform_memory_probe = true
require_platform_memory_ceiling = false

[server.parser]
sbps_enabled = true
sbps_endpoint = runtime/control/sb_server.sbps.sock
sbps_max_frame_bytes = 1048576
sbps_max_streams = 256
sbps_hello_timeout_ms = 30000
worker_restart_max = 5
worker_restart_window_ms = 60000
