# ScratchBird Single Node Manager public standalone configuration template.

manager.profile = default
manager.mode = foreground
manager.control_dir = runtime/manager/control
manager.runtime_dir = runtime/manager/runtime
manager.listener_command = bin/SBgate
manager.server_command = bin/SBsrv
manager.restart_policy = bounded
manager.restart_max = 5
manager.restart_window_ms = 60000
manager.drain_timeout_ms = 30000
manager.metrics_enabled = true
manager.management_auth_required = true
