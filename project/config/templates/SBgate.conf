# ScratchBird Listener public standalone configuration template.

listener_profile = default
lifecycle_generation = 1
controller_type = direct
protocol_family = sbsql
parser_package = SBParser
bundle_contract_id = sbp_sbsql@1
parser_executable = bin/SBParser
database_selector = server_database_default
server_endpoint = runtime/control/sb_server.sbps.sock
bind_address = 127.0.0.1
port = 3050
control_dir = runtime/listener/control
runtime_dir = runtime/listener/runtime
metrics_namespace = sys.metrics.listener
language = en
parser_api_major = 1
parser_api_minor = 0
warm_pool_min = 1
warm_pool_max = 16
accept_backlog = 128
idle_poll_ms = 250
child_restart_base_ms = 250
child_restart_max_ms = 30000
child_quarantine_failures = 5
child_quarantine_window_ms = 60000
dbbt_ttl_ms = 30000
preauth_timeout_ms = 30000
handoff_ack_timeout_ms = 2000
graceful_drain_timeout_ms = 30000
management_poll_ms = 250
per_client_max_connections = 0
accept_rate_limit_per_second = 0
accept_rate_limit_burst = 0
managed_by_server = true
managed_by_manager = false
tls_required = true
allow_dev_dbbt_env = false
allow_test_dbbt_builtin = false
enable_metrics = true
enable_accept_loop = true
read_only = false
maintenance_mode = false
spawn_strategy = warm_pool
dbbt_key_source = keyring
